# Example Prometheus scrape_config snippet for sp-rtk-base.
#
# Drop into the `scrape_configs:` list of your prometheus.yml.  The
# `/metrics` endpoint is exposed by the sp-rtk-base FastAPI app on the
# same port as the UI (8080 by default) and requires no authentication —
# it's intended to be scraped over a private LAN / VPN.  See README
# in this directory for guidance when scraping over the internet.
#
# The `base` label is required for the bundled Grafana dashboard's
# `$base` template variable to be populated.  Pick any short
# identifier per base station (e.g. `home`, `larson-base`, `field-01`).

scrape_configs:
  - job_name: sp-rtk-base
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "rtk-base.lan:8080"           # ← replace with your host:port
        labels:
          base: home                       # ← pick a unique short label per base station

      # Add more base stations by appending another `- targets:` block.
      # Example for a remote base you have private LAN reach to:
      # - targets:
      #     - "field-01.tailnet:8080"
      #   labels:
      #     base: field-01
