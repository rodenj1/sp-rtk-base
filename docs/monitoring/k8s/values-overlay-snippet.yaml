# Snippet to merge into your kube-prometheus-stack values overlay
# (whatever Helm values file your ArgoCD Application already
# references for the monitoring chart).
#
# This enables the Prometheus remote-write *receiver* — the in-cluster
# Prom will accept POSTs to `/api/v1/write` from outside agents.  The
# Traefik IngressRoute + BasicAuth Middleware are what gate access to
# that endpoint from the public internet; without them the receiver
# is only reachable in-cluster.
#
# Apply via your normal ArgoCD sync.  The Prometheus Operator
# reconciles the Prometheus CR; the running Prom pod restarts with
# `--web.enable-remote-write-receiver` on its command line.
#
# To verify after the restart:
#
#   kubectl -n monitoring exec sts/prometheus-kube-prometheus-prometheus -- \
#     wget -qO- http://localhost:9090/api/v1/status/flags \
#     | jq '.["web.enable-remote-write-receiver"]'
#   # → "true"

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
