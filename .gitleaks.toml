# Gitleaks configuration for sp-rtk-base.
#
# Extends the default ruleset (~100+ built-in detectors for AWS, GitHub,
# PyPI, Stripe, Slack, SSH keys, generic high-entropy strings, etc.) with
# project-specific rules.
#
# Custom rules below explicitly forbid identifier strings that appeared
# historically in the sp-rtk-base / sp-rtk-base-relay projects and had to
# be scrubbed.  They must never re-enter the repo, even as docstring
# examples.
#
# History scrub for sp-rtk-base (May 20, 2026):
#   - "98:D3:51:FE:FE:E4"  (real Bluetooth GPS MAC, replaced by example
#     "00:11:22:33:44:55" in src/sp_rtk_base/ui/pages/input.py)
#
# The remaining tokens (NTRIP password, mountpoint, caster IP, BlueZ
# underscore MAC, advertised device name) never appeared in sp-rtk-base
# but are blocked here defensively because the same operator runs both
# repos.
#
# Docs: https://github.com/gitleaks/gitleaks#configuration

[extend]
# Inherit gitleaks' default rules (recommended starting point).
useDefault = true

# ============================================================================
# Custom rules — historical / cross-project scrub tokens
# ============================================================================

[[rules]]
id = "scrub-bt-mac-colon"
description = "Real Bluetooth GPS device MAC address (colon form)."
regex = '''98:D3:51:FE:FE:E4'''
tags = ["scrub", "device-id"]

[[rules]]
id = "scrub-bt-mac-underscore"
description = "Real Bluetooth GPS device MAC address (BlueZ DBus underscore form)."
# No leading \b — `_` is a regex word character.
regex = '''98_D3_51_FE_FE_E4'''
tags = ["scrub", "device-id"]

[[rules]]
id = "scrub-bt-device-name"
description = "Real Bluetooth GPS device advertised name."
regex = '''RTK_BASE_ROD'''
tags = ["scrub", "device-id"]

[[rules]]
id = "scrub-rtcm-caster-password"
description = "Real RTCM caster password from the sp-rtk-base-relay leak."
regex = '''\bdae5\b'''
tags = ["scrub", "credential"]

[[rules]]
id = "scrub-ntrip-mountpoint-username"
description = "Real NTRIP mountpoint/username from the sp-rtk-base-relay leak."
regex = '''RODEN01'''
tags = ["scrub", "credential"]

[[rules]]
id = "scrub-rtcm-caster-ip"
description = "Real RTCM caster IP address from the sp-rtk-base-relay leak."
regex = '''91\.186\.9\.136'''
tags = ["scrub", "infrastructure"]

# ============================================================================
# Allowlist — files that legitimately contain hex/IP/secret-like patterns
# ============================================================================
#
# Without these, gitleaks' generic high-entropy and "IP-address-near-port"
# rules would flag uv.lock (full of SHA-256 hashes), example configs (full
# of placeholder credentials), and test fixtures (full of synthetic data).
[allowlist]
description = "Paths and patterns that legitimately contain secret-shaped strings."

paths = [
    # Lockfile is full of SHA-256 hashes that look like high-entropy secrets.
    '''^uv\.lock$''',
    # Test fixtures and mocks intentionally use synthetic credentials.
    '''^tests/fixtures/''',
    # Documentation may reference credential patterns in prose without
    # actual values; commit content is reviewed at PR time anyway.
    '''^docs/.*\.md$''',
    # Memory bank documents the scrub itself.
    '''^memory-bank/.*\.md$''',
    # CHANGELOG.md is auto-generated from commit history by commitizen
    # (`cz bump`); historical commit subjects may legitimately reference
    # scrub strings.  Working-tree review on every PR catches anything new.
    '''^CHANGELOG\.md$''',
    # This file itself contains the forbidden patterns by definition.
    '''^\.gitleaks\.toml$''',
    # Pre-commit config mentions the scrub for context.
    '''^\.pre-commit-config\.yaml$''',
]

regexes = [
    # Placeholder/example values from our docs and config samples.
    '''your[_-]password''',
    '''your[_-]mountpoint''',
    '''your[_-]username''',
    '''rtcm\.example\.com''',
    '''example\.com''',
    # Standard "fake MAC" used in IETF / Wireshark example traffic.
    '''00:11:22:33:44:55''',
    '''00_11_22_33_44_55''',
    # Generic example/dummy device name.
    '''RTK_GPS_BASE''',
]
