# Pre-commit hooks for sp-rtk-base.
#
# Three hook stages, fastest-first:
#
#   pre-commit  — runs on every `git commit`, must be fast (<5 s):
#                 whitespace + YAML/TOML basics, ruff lint + format, gitleaks.
#   commit-msg  — runs on every `git commit` against the message:
#                 commitizen enforces Conventional Commits 1.0.0.
#   pre-push    — runs once before `git push`, slow OK:
#                 pyright strict, full pytest unit suite.
#
# Install (run once after clone):
#   uv run pre-commit install \
#       --install-hooks --hook-type pre-commit \
#       --hook-type commit-msg --hook-type pre-push
#
# Bypass (use only in emergencies — CI will still enforce):
#   git commit --no-verify
#   git push   --no-verify

default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

# Don't fail-fast: surface every problem in one run so contributors can
# fix them in a single iteration.
fail_fast: false

repos:
  # ------------------------------------------------------------------
  # Stock hygiene checks — whitespace, EOF, YAML/TOML validity, large
  # files, merge conflicts.
  # ------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        files: '\.(yaml|yml)$'
        exclude: '^(\.github/|.*\.lock)$'
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-case-conflict

  # ------------------------------------------------------------------
  # Ruff — lint with auto-fix, then format.
  # ------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ------------------------------------------------------------------
  # Gitleaks — secret detection on the staged diff.  Custom rules in
  # .gitleaks.toml block the historical scrub tokens.
  # ------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ------------------------------------------------------------------
  # Commitizen — enforce Conventional Commits 1.0.0 on commit messages.
  # ------------------------------------------------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.0.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ------------------------------------------------------------------
  # Heavy local hooks — only run on `git push`, not every commit.
  # These call into the project's uv-managed venv so versions match
  # CI exactly.
  # ------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict, src/)
        entry: uv run pyright src
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]

      - id: pytest-unit
        name: pytest (unit suite, no coverage gate)
        # --no-cov disables coverage so the 90% fail-under gate from
        # pyproject.toml doesn't apply at push time; CI still enforces it.
        entry: uv run pytest tests/unit -q -x --no-cov
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]
