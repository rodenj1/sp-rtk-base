# Traefik Middleware: HTTP Basic Auth gate for the public remote_write
# endpoint.  Referenced by the IngressRoute in prom-rw-ingressroute.yaml.
#
# The `secret` field references a Kubernetes Secret named
# `prom-rw-basicauth` in the same namespace.  That Secret carries a
# single key `users` whose value is htpasswd-format bcrypt entries
# (one per line: `<user>:<bcrypt-hash>`).  In a GitOps setup this Secret
# is unsealed from a SealedSecret — see prom-rw-basicauth.sealedsecret.yaml.example
# for how to regenerate.
#
# `removeHeader: true` strips the `Authorization` header before
# forwarding to Prom so the upstream service never sees the credential.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: prom-rw-basicauth
  namespace: monitoring
spec:
  basicAuth:
    secret: prom-rw-basicauth
    removeHeader: true
