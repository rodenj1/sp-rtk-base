name: Release

# Publishes sp-rtk-base to PyPI when a GitHub Release is published.
#
# Authentication uses PyPI Trusted Publishing (OIDC) — no API token secret.
# A "pending publisher" must be registered on pypi.org once for the first
# release.  See docs/release-process.md for the full setup runbook.
#
# Pipeline:
#   1. verify-version  — fail if the release tag != pyproject.toml version
#   2. lint            — same gates as ci.yml
#   3. test (matrix)   — Python 3.10 / 3.11 / 3.12 / 3.13
#   4. build           — uv build + twine check; upload dist/ artifact
#   5. publish-pypi    — pypa/gh-action-pypi-publish via OIDC
#   6. github-release-assets
#                      — sigstore-sign dist files; attach to GitHub Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish (e.g. v0.1.0). Must exist as a GitHub Release."
        required: true
        type: string

# One release at a time per tag.  We deliberately do NOT cancel-in-progress —
# a partial upload to PyPI cannot be retried under the same version.
concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Verify the release tag matches pyproject.toml version.  Also bails
  # out if the GitHub Release is a draft or pre-release (defensive —
  # the "release: published" trigger should not fire on drafts).
  # ------------------------------------------------------------------
  verify-version:
    name: Verify tag matches pyproject version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.versions.outputs.pyproject_version }}
      tag: ${{ steps.versions.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve tag and pyproject version
        id: versions
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          IS_DRAFT: ${{ github.event.release.draft }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail
          tag="${EVENT_TAG:-$INPUT_TAG}"
          if [[ -z "$tag" ]]; then
            echo "::error::No release tag supplied (event or workflow_dispatch input)."
            exit 1
          fi

          # Strip optional leading 'v'
          tag_version="${tag#v}"

          # Extract version from pyproject.toml (first 'version = "..."' under [project])
          pyproject_version="$(
            python3 -c '
          import re, sys
          text = open("pyproject.toml", encoding="utf-8").read()
          m = re.search(r"^\[project\][^\[]*?^version\s*=\s*\"([^\"]+)\"",
                        text, re.MULTILINE | re.DOTALL)
          if not m:
              sys.exit("Could not find version in pyproject.toml")
          print(m.group(1))
          '
          )"

          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "tag_version=$tag_version" >>"$GITHUB_OUTPUT"
          echo "pyproject_version=$pyproject_version" >>"$GITHUB_OUTPUT"

          echo "Release tag:       $tag (version: $tag_version)"
          echo "pyproject version: $pyproject_version"

          if [[ "$tag_version" != "$pyproject_version" ]]; then
            echo "::error::Tag '$tag' (version '$tag_version') does not match pyproject.toml version '$pyproject_version'. Bump pyproject.toml or retag."
            exit 1
          fi

          if [[ "${IS_DRAFT:-false}" == "true" ]]; then
            echo "::error::GitHub Release is a draft — refusing to publish."
            exit 1
          fi

          if [[ "${IS_PRERELEASE:-false}" == "true" ]]; then
            echo "::error::GitHub Release is marked as pre-release.  This workflow only publishes stable releases to PyPI."
            exit 1
          fi

  # ------------------------------------------------------------------
  # Lint / format / type-check (mirrors ci.yml lint job)
  # ------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: verify-version
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy (strict)
        run: uv run mypy src

      - name: pyright (strict, canonical)
        run: uv run pyright src

      - name: pylint (advisory)
        continue-on-error: true
        run: uv run pylint --exit-zero src

  # ------------------------------------------------------------------
  # Unit tests — matrix across Python 3.10, 3.11, 3.12, 3.13
  # ------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Run pytest with coverage
        run: |
          uv run pytest tests/unit \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            --junitxml=pytest-junit.xml

  # ------------------------------------------------------------------
  # Build sdist + wheel, validate metadata, upload as artifact
  # ------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [verify-version, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install dependencies (for twine)
        run: uv sync --locked --all-extras

      - name: Build sdist and wheel
        run: uv build

      - name: List built artifacts
        run: ls -la dist/

      - name: Validate distribution with twine
        run: uvx twine check --strict dist/*

      - name: Confirm version in built artifacts
        env:
          EXPECTED: ${{ needs.verify-version.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ok=0
          for f in dist/*.tar.gz dist/*.whl; do
            case "$f" in
              *"-${EXPECTED}.tar.gz"|*"-${EXPECTED}-"*.whl)
                echo "OK: $f matches version ${EXPECTED}"
                ok=1
                ;;
              *)
                echo "::error::Built artifact $f does not contain expected version ${EXPECTED}"
                exit 1
                ;;
            esac
          done
          if [[ "$ok" -eq 0 ]]; then
            echo "::error::No artifacts found in dist/"
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: dist/
          retention-days: 30
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Publish to PyPI via Trusted Publishing (OIDC).
  # The `pypi` environment must exist in repo settings; PyPI must have a
  # trusted publisher configured for (rodenj1/sp-rtk-base,
  # release.yml, environment: pypi).
  # ------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [verify-version, build]
    environment:
      name: pypi
      url: https://pypi.org/project/sp-rtk-base/${{ needs.verify-version.outputs.version }}/
    permissions:
      id-token: write    # required for OIDC trusted publishing
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # No `with:` block — authentication is automatic via OIDC.
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  # ------------------------------------------------------------------
  # Sign artifacts with sigstore and attach them (plus signatures) to
  # the GitHub Release for archival / verification.
  # ------------------------------------------------------------------
  github-release-assets:
    name: Sign & attach to GitHub Release
    runs-on: ubuntu-latest
    needs: [verify-version, publish-pypi]
    permissions:
      contents: write    # upload assets to the Release
      id-token: write    # sigstore OIDC signing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Sign with sigstore
        uses: sigstore/gh-action-sigstore-python@f7ad0af51a5648d09a20d00370f0a91c3bdf8f84 # v3.0.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          # The default (true) makes sigstore also try to download
          # https://github.com/<owner>/<repo>/archive/refs/tags/<tag>.zip
          # which is a redundant copy of the already-signed source.
          # Disable to avoid duplicate signing.
          release-signing-artifacts: false

      - name: List signed artifacts
        run: ls -la dist/

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore
            dist/*.sigstore.json
          fail_on_unmatched_files: false
